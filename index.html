<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Modal Fretboard — Scale & Mode Visualizer</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { height: 100%; }
  body {
    font-family: 'Syne', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0d1a2e;
    color: #fff;
    font-size: 14px;
    padding: 2rem;
    min-height: 100vh;
  }

  h1 { font-family: 'Syne', sans-serif; font-size: 36px; font-weight: 800; letter-spacing: -0.02em; line-height: 1.1; margin-bottom: 0.3rem; }
  .subtitle { font-family: 'DM Mono', monospace; font-size: 11px; font-weight: 400; letter-spacing: 0.25em; text-transform: uppercase; color: #3eb8f0; margin-bottom: 2rem; }

  /* ── Controls ── */
  .controls { display: flex; flex-direction: column; gap: 1rem; margin-bottom: 1.75rem; }
  .control-row { display: flex; align-items: center; gap: 1rem; flex-wrap: wrap; }
  .ctrl-label {
    font-size: 11px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.07em; color: #7a8fa8; width: 50px; flex-shrink: 0;
  }
  .btn-group { display: flex; gap: 5px; flex-wrap: wrap; }
  .btn {
    padding: 6px 13px; border-radius: 6px;
    border: 1.5px solid #253550; background: #111d2e;
    color: #8aa4c0; font-size: 14px; font-weight: 500;
    cursor: pointer; font-family: inherit;
    transition: border-color 0.1s, color 0.1s, background 0.1s;
  }
  .btn:hover { border-color: #3a5070; color: #ccd8e8; }
  .btn.key-active  { background: #f97316; border-color: #f97316; color: #fff; font-weight: 700; }
  .btn.mode-active { background: #0f2234; border-color: #38bdf8; color: #38bdf8; font-weight: 600; }

  /* ── Mode info ── */
  .mode-info {
    background: #0a1422; border: 1px solid #1a2840;
    border-radius: 10px; padding: 1rem 1.25rem;
    margin-bottom: 1.5rem; display: flex;
    flex-direction: column; gap: 0.6rem;
  }
  .info-top { display: flex; align-items: baseline; gap: 0.6rem; flex-wrap: wrap; }
  .info-title { font-size: 19px; font-weight: 700; }
  .info-alias { font-size: 14px; color: #7a8fa8; }
  .info-desc { font-size: 14px; color: #7a8fa8; }
  .note-strip { display: flex; gap: 5px; flex-wrap: wrap; margin-top: 2px; }
  .note-badge {
    display: flex; flex-direction: column; align-items: center;
    border-radius: 6px; padding: 4px 8px; min-width: 32px;
    background: #141c26; border: 1px solid #1d3a52;
  }
  .note-badge.nb-root { background: #3d1500; border-color: #f97316; }
  .note-badge.nb-char { background: #3d2f00; border-color: #fbbf24; }
  .nb-deg { font-size: 11px; color: #7a8fa8; font-family: monospace; line-height: 1.2; }
  .nb-deg.root  { color: #c09820; }
  .nb-deg.char  { color: #c06020; }
  .nb-deg.scale { color: #2a8aaa; }
  .nb-name { font-size: 15px; font-weight: 700; color: #fff; line-height: 1.3; }
  .nb-name.root  { color: #f97316; }
  .nb-name.char  { color: #fbbf24; }
  .nb-name.scale { color: #3eb8f0; }
  /* chord strip */
  .info-strips { display: flex; gap: 2rem; align-items: flex-start; flex-wrap: wrap; }
  .key-info { display: flex; flex-direction: column; gap: 0.3rem; }
  #chord-strip-wrap { display: flex; flex-direction: column; gap: 0.3rem; padding-left: 1.75rem; border-left: 1px solid #1d2d45; }
  .chord-strip-name { font-size: 19px; font-weight: 700; color: #db3eb1; line-height: 1.2; }
  .note-badge.nb-chord-root { background: #2d0a28; border-color: #db3eb1; box-shadow: 0 0 0 1.5px rgba(255,255,255,0.28); }
  .note-badge.nb-chord-tone { background: #1e0820; border-color: #7a2062; }
  .nb-deg.chord-root { color: #d060b0; }
  .nb-deg.chord-tone { color: #804070; }
  .nb-name.chord-root { color: #db3eb1; }
  .nb-name.chord-tone { color: #b050a0; }

  /* ── Fretboard ── */
  .fretboard-outer {
    overflow-x: auto; margin-bottom: 1.5rem;
    border-radius: 10px; background: #1e1e1e;
    border: 1px solid #333333;
    scrollbar-width: thin;
    scrollbar-color: #444444 #1e1e1e;
  }
  .fretboard-outer::-webkit-scrollbar { height: 6px; }
  .fretboard-outer::-webkit-scrollbar-track { background: #1e1e1e; }
  .fretboard-outer::-webkit-scrollbar-thumb { background: #444444; border-radius: 3px; }
  .fretboard-outer svg { display: block; }

  /* ── Legend ── */
  .legend { display: flex; gap: 1.5rem; flex-wrap: wrap; }
  .leg-item { display: flex; align-items: center; gap: 7px; font-size: 14px; color: #7a8fa8; }
  .leg-dot { width: 16px; height: 16px; border-radius: 50%; flex-shrink: 0; }
  .leg-dot.root  { background: #f97316; }
  .leg-dot.char  { background: #fbbf24; }
  .leg-dot.triad { background: #db3eb1; }
  .leg-dot.scale { background: rgba(62,184,240,0.5); }

  /* ── Pad button ── */
  @keyframes pad-pulse {
    0%, 100% { box-shadow: 0 0 5px 1px rgba(62,184,240,0.15); border-color: #1d3050; }
    50%       { box-shadow: 0 0 14px 4px rgba(62,184,240,0.55); border-color: #3eb8f0; }
  }
  .pad-wrap { padding-left: 1.75rem; border-left: 1px solid #1d2d45; display: flex; align-items: center; }
  .pad-btn {
    font-family: 'Syne', sans-serif; font-weight: 800;
    font-size: 26px; color: #3eb8f0;
    background: #0d1a2e; border: 1.5px solid #1d3050;
    border-radius: 10px; padding: 10px 22px; min-width: 80px;
    cursor: pointer; transition: background 0.15s;
    line-height: 1.1; white-space: nowrap;
    animation: pad-pulse 2.8s ease-in-out infinite;
  }
  .pad-btn:hover { background: #142030; }
  .pad-btn.pad-active { background: #2d0a28; border-color: #db3eb1; color: #db3eb1; animation: none; box-shadow: 0 0 12px 3px rgba(219,62,177,0.45); }

  /* ── Build tag ── */
  .build-tag { font-family: 'DM Mono', monospace; font-size: 10px; color: #2a3a50; margin-top: 2rem; letter-spacing: 0.1em; }
</style>
</head>
<body>

<h1><span style="color:#3eb8f0;">Modal</span> Fretboard</h1>
<p class="subtitle">Modes of the Major Scale — butter notes highlighted</p>

<div class="controls">
  <div class="control-row">
    <span class="ctrl-label">Key</span>
    <div class="btn-group" id="key-btns"></div>
    <div class="btn-group" id="notation-btns" style="margin-left:0.75rem;"></div>
  </div>
  <div class="control-row">
    <span class="ctrl-label">Mode</span>
    <div class="btn-group" id="mode-btns"></div>
  </div>
  <div class="control-row">
    <span class="ctrl-label">View</span>
    <div class="btn-group" id="fret-btns"></div>
  </div>
  <div class="control-row">
    <span class="ctrl-label" id="chord-label">Triad</span>
    <div class="btn-group" id="triad-btns"></div>
  </div>
  <div class="control-row">
    <span class="ctrl-label">Labels</span>
    <div class="btn-group" id="label-btns"></div>
  </div>
</div>

<div class="mode-info">
  <div class="info-strips">
    <div class="key-info">
      <div class="info-top">
        <span class="info-title" id="info-title"></span>
        <span class="info-alias" id="info-alias"></span>
      </div>
      <div class="note-strip" id="note-strip"></div>
    </div>
    <div id="chord-strip-wrap" style="display:none">
      <div class="chord-strip-name" id="chord-strip-title"></div>
      <div class="note-strip" id="chord-strip"></div>
    </div>
    <div class="pad-wrap">
      <button id="pad-btn" class="pad-btn" onclick="togglePad()">—</button>
    </div>
  </div>
  <div class="info-desc" id="info-desc"></div>
</div>

<div class="fretboard-outer">
  <svg id="fretboard"></svg>
</div>

<div class="legend">
  <div class="leg-item"><div class="leg-dot root"></div>Root</div>
  <div class="leg-item"><div class="leg-dot char"></div>Butter Note</div>
  <div class="leg-item"><div class="leg-dot triad"></div>Chord tone</div>
  <div class="leg-item"><div class="leg-dot scale"></div>Scale tone</div>
</div>

<div class="build-tag">v1.5 · build 26062908</div>

<script>
// ── Music data ──────────────────────────────────────────────────────────────

const CHR_SHARP = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
const CHR_FLAT  = ['C','Db','D','Eb','E','F','Gb','G','Ab','A','Bb','B'];

// Diatonic note naming — always spells notes by scale degree, never enharmonic clashes
const ROOT_LETTER = [0,1,1,2,2,3,3,4,5,5,6,6]; // C Db D Eb E F F# G Ab A Bb B
const LETTERS     = ['C','D','E','F','G','A','B'];
const LETTER_SEMI = [0,2,4,5,7,9,11];

function diatonicName(rootSemi, degreeIdx, interval) {
  const tl   = (ROOT_LETTER[rootSemi % 12] + degreeIdx) % 7;
  const nat  = LETTER_SEMI[tl];
  const act  = (rootSemi + interval) % 12;
  const diff = ((act - nat) + 12) % 12;
  return LETTERS[tl] + (diff===0?'':diff===1?'#':diff===11?'b':diff===2?'##':'bb');
}

function resolvedName(rootSemi, degreeIdx, interval) {
  const semi = ((rootSemi + interval) % 12 + 12) % 12;
  if (selNotation === '#') return CHR_SHARP[semi];
  if (selNotation === 'b') return CHR_FLAT[semi];
  return diatonicName(rootSemi, degreeIdx, interval);
}
// index = semitone (0=C). true = prefer flats for this root
const USE_FLATS = [false,true,false,true,false,true,false,false,true,false,true,false];
const KEY_NAMES = ['C','Db','D','Eb','E','F','F#','G','Ab','A','Bb','B'];

// characteristic: the notes that uniquely colour THIS mode vs adjacent modes
const MODES = [
  {
    name:'Ionian', alias:'Major',
    intervals:[0,2,4,5,7,9,11],
    characteristic:[4,11],
    degrees:['1','2','3','4','5','6','7'],
    desc:'maj3 + maj7 — the bright, resolved major sound'
  },
  {
    name:'Dorian',
    intervals:[0,2,3,5,7,9,10],
    characteristic:[3,9],
    degrees:['1','2','b3','4','5','6','b7'],
    desc:'b3 + natural 6 — minor with that raised, hopeful 6th'
  },
  {
    name:'Phrygian',
    intervals:[0,1,3,5,7,8,10],
    characteristic:[1,8],
    degrees:['1','b2','b3','4','5','b6','b7'],
    desc:'b2 + b6 — the flat 2nd is what makes it Phrygian'
  },
  {
    name:'Lydian',
    intervals:[0,2,4,6,7,9,11],
    characteristic:[4,6,11],
    degrees:['1','2','3','#4','5','6','7'],
    desc:'#4 + maj3 + maj7 — the raised 4th gives it that floating quality'
  },
  {
    name:'Mixolydian',
    intervals:[0,2,4,5,7,9,10],
    characteristic:[4,10],
    degrees:['1','2','3','4','5','6','b7'],
    desc:'maj3 + b7 — dominant tension without resolving'
  },
  {
    name:'Aeolian', alias:'Natural Minor',
    intervals:[0,2,3,5,7,8,10],
    characteristic:[3,8],
    degrees:['1','2','b3','4','5','b6','b7'],
    desc:'b3 + b6 — the flat 6th separates it from Dorian'
  },
  {
    name:'Locrian',
    intervals:[0,1,3,5,6,8,10],
    characteristic:[1,6],
    degrees:['1','b2','b3','4','b5','b6','b7'],
    desc:'b2 + b5 — the diminished 5th makes it inherently unstable'
  },
];

// Standard tuning low E → high e (semitones, 0 = C)
const TUNING = [4, 9, 2, 7, 11, 4];   // E2 A2 D3 G3 B3 E4
const STR_NAMES = ['E','A','D','G','B','e'];

// ── State ────────────────────────────────────────────────────────────────────
let selKey   = 2;   // D
let selMode  = 1;   // Dorian
let selFrets = 15;
let selLabel = 'interval';  // 'interval' | 'note'
let selTriad    = null;      // null | 0–6 (diatonic degree index)
let selNotation = 'auto';   // 'auto' | '#' | 'b'

// ── Helpers ──────────────────────────────────────────────────────────────────
function noteName(semi, useFlats) {
  return (useFlats ? CHR_FLAT : CHR_SHARP)[((semi % 12) + 12) % 12];
}

// ── Layout constants ─────────────────────────────────────────────────────────
const LP      = 38;   // left pad (string name column)
const OPEN_W  = 46;   // open-string column width (before nut)
const NUT_W   = 7;
const TP      = 26;   // top pad (fret number row)
const BP      = 36;   // bottom pad
const NSTR    = 6;

const SINGLE_DOTS = [3, 5, 7, 9, 15, 17, 19, 21];
const DOUBLE_DOTS = [12, 24];
const NUT_X   = LP + OPEN_W;

// Dynamic per render
let FW, SH, DOT_R, NFRETS_D, FRET_START;

function setLayout() {
  const isBox    = selFrets === 'box';
  const isTriads = selFrets === 'triads';
  const is7ths   = selFrets === '7ths';
  const big      = selFrets === 15 || isTriads || is7ths;
  FW       = isBox ? 80 : big ? 64 : 50;
  SH       = isBox ? 36 : big ? 34 : 30;
  DOT_R    = isBox ? 13 : big ? 12 : 11;
  NFRETS_D = isBox ? 5  : (isTriads || is7ths) ? 15 : selFrets;
}

function getBoxStart(rootSemi) {
  const openE = TUNING[0]; // 4 = E
  let f = ((rootSemi - openE) + 12) % 12;
  if (f === 0) f = 12; // open E: use octave position
  return f;
}

function fretCX(f) { return NUT_X + NUT_W + (f - FRET_START + 0.5) * FW; }
function fretRX(f) { return NUT_X + NUT_W + (f - FRET_START + 1) * FW; }
function strY(s)   { return TP + (NSTR - 1 - s) * SH; }

// ── Diatonic chord builders ───────────────────────────────────────────────────
function getTriads(rootSemi, modeIdx) {
  const ivs = MODES[modeIdx].intervals;
  return ivs.map((iv, i) => {
    const t3 = ((ivs[(i+2)%7] - iv) + 12) % 12;
    const t5 = ((ivs[(i+4)%7] - iv) + 12) % 12;
    const q  = t3===4&&t5===7?'':t3===3&&t5===7?'m':t3===3&&t5===6?'°':t3===4&&t5===8?'+':'?';
    const idxs = [(i+0)%7, (i+2)%7, (i+4)%7];
    const labels = ['R', t3===4?'3':'b3', t5===7?'5':t5===6?'b5':'#5'];
    const degMap3 = {};
    idxs.forEach((j, k) => { degMap3[(rootSemi + ivs[j]) % 12] = labels[k]; });
    return {
      name:   resolvedName(rootSemi, i, iv) + q,
      notes:  new Set(idxs.map(j => (rootSemi + ivs[j]) % 12)),
      degMap3,
    };
  });
}

function get7ths(rootSemi, modeIdx) {
  const ivs = MODES[modeIdx].intervals;
  return ivs.map((iv, i) => {
    const t3 = ((ivs[(i+2)%7] - iv) + 12) % 12;
    const t5 = ((ivs[(i+4)%7] - iv) + 12) % 12;
    const t7 = ((ivs[(i+6)%7] - iv) + 12) % 12;
    const qname = t3===4&&t5===7&&t7===11?'maj7':
                  t3===3&&t5===7&&t7===10?'m7':
                  t3===4&&t5===7&&t7===10?'7':
                  t3===3&&t5===6&&t7===10?'ø7':
                  t3===3&&t5===6&&t7===9?'°7':'?';
    const idxs = [(i+0)%7, (i+2)%7, (i+4)%7, (i+6)%7];
    const labels = ['R', t3===4?'3':'b3', t5===7?'5':t5===6?'b5':'#5', t7===11?'7':t7===10?'b7':'bb7'];
    const degMap7 = {};
    idxs.forEach((j, k) => { degMap7[(rootSemi + ivs[j]) % 12] = labels[k]; });
    return {
      name:   resolvedName(rootSemi, i, iv) + qname,
      notes:  new Set(idxs.map(j => (rootSemi + ivs[j]) % 12)),
      degMap7,
    };
  });
}

// ── Note classification ───────────────────────────────────────────────────────
function classify(semi, rootSemi, charSet, scaleSet, triadSet) {
  const n = ((semi % 12) + 12) % 12;
  if (n === ((rootSemi % 12) + 12) % 12) return 'root';
  if (triadSet && triadSet.has(n)) return 'triad';
  if (charSet.has(n)) return 'char';
  if (scaleSet.has(n)) return 'scale';
  return null;
}

const DOT_COLORS = {
  root:        { fill: '#f97316', stroke: '#c2410c', text: '#fff', opacity: 0.85 },
  root_faded:  { fill: '#f97316', stroke: '#c2410c', text: '#fff', opacity: 0.22, textOpacity: 0 },
  char:        { fill: '#fbbf24', stroke: '#d97706', text: '#fff', opacity: 0.85 },
  triad:       { fill: '#db3eb1', stroke: '#a02b82', text: '#fff', opacity: 0.85 },
  triad_root:  { fill: '#db3eb1', stroke: '#a02b82', text: '#fff', opacity: 0.85, ring: 'rgba(255,255,255,0.75)' },
  scale:       { fill: '#3eb8f0', stroke: '#2090be', text: '#fff', opacity: 0.28 },
  scale_ghost: { fill: '#3eb8f0', stroke: '#2090be', text: '#fff', opacity: 0.10, textOpacity: 0 },
};

// ── SVG builder ───────────────────────────────────────────────────────────────
function buildSVG(rootSemi, modeIdx) {
  setLayout();
  const isBox    = selFrets === 'box';
  const isTriads = selFrets === 'triads';
  const is7ths   = selFrets === '7ths';
  FRET_START = isBox ? getBoxStart(rootSemi) : 1;

  const mode     = MODES[modeIdx];
  const scaleSet = new Set(mode.intervals.map(i => (rootSemi + i) % 12));
  const charSet  = new Set([...mode.characteristic, mode.intervals[2]].map(i => (rootSemi + i) % 12));

  // Diatonic note names and degree labels keyed by absolute semitone
  const nameMap = {};
  const degMap  = {};
  mode.intervals.forEach((interval, idx) => {
    const semi = (rootSemi + interval) % 12;
    nameMap[semi] = resolvedName(rootSemi, idx, interval);
    degMap[semi]  = interval === 0 ? 'R' : mode.degrees[idx];
  });

  // Chord set and chord-relative degree labels for current selection
  const chords      = is7ths ? get7ths(rootSemi, modeIdx) : getTriads(rootSemi, modeIdx);
  const triadSet    = selTriad !== null ? chords[selTriad].notes : null;
  const chordDegMap = selTriad !== null ? (is7ths ? chords[selTriad].degMap7 : chords[selTriad].degMap3) : null;
  const isGhostMode = isTriads || is7ths;

  const svgW = LP + OPEN_W + NUT_W + NFRETS_D * FW + 24;
  const svgH = TP + (NSTR - 1) * SH + BP;

  const el = document.getElementById('fretboard');
  el.setAttribute('width', svgW);
  el.setAttribute('height', svgH);
  el.setAttribute('viewBox', `0 0 ${svgW} ${svgH}`);

  const p = [];

  // fretboard body
  p.push(`<rect x="${NUT_X + NUT_W}" y="${TP - 5}" width="${NFRETS_D * FW + 14}" height="${(NSTR - 1) * SH + 10}" rx="3" fill="#2d2d2d"/>`);

  const fretEnd = FRET_START + NFRETS_D - 1;
  const midY    = TP + (NSTR - 1) * SH / 2;
  const inlayR  = SH > 30 ? 6 : 5;
  const numFS   = SH > 30 ? 12 : 10;
  const strFS   = SH > 30 ? 13 : 11;

  // fret inlays
  for (const f of SINGLE_DOTS) {
    if (f < FRET_START || f > fretEnd) continue;
    p.push(`<circle cx="${fretCX(f)}" cy="${midY}" r="${inlayR}" fill="#1a1a1a"/>`);
  }
  for (const f of DOUBLE_DOTS) {
    if (f < FRET_START || f > fretEnd) continue;
    p.push(`<circle cx="${fretCX(f)}" cy="${midY - SH * 0.28}" r="${inlayR - 1}" fill="#1a1a1a"/>`);
    p.push(`<circle cx="${fretCX(f)}" cy="${midY + SH * 0.28}" r="${inlayR - 1}" fill="#1a1a1a"/>`);
  }

  // strings
  for (let s = 0; s < NSTR; s++) {
    const y  = strY(s);
    const sw = 0.8 + (NSTR - 1 - s) * 0.28;
    p.push(`<line x1="${NUT_X + NUT_W}" y1="${y}" x2="${svgW - 10}" y2="${y}" stroke="#999999" stroke-width="${sw}"/>`);
    if (!isBox) p.push(`<line x1="${LP}" y1="${y}" x2="${NUT_X}" y2="${y}" stroke="#666666" stroke-width="${sw * 0.8}"/>`);
  }

  // nut (full view only) or position label (box mode)
  if (!isBox) {
    p.push(`<rect x="${NUT_X}" y="${TP - 5}" width="${NUT_W}" height="${(NSTR - 1) * SH + 10}" rx="2" fill="#aaaaaa"/>`);
  } else {
    p.push(`<text x="${LP + OPEN_W / 2}" y="${midY + 5}" text-anchor="middle" font-size="11" font-family="monospace" fill="#5a7090">${FRET_START}fr</text>`);
  }

  // fret lines
  for (let f = FRET_START; f <= fretEnd; f++) {
    const x = fretRX(f);
    p.push(`<line x1="${x}" y1="${TP - 3}" x2="${x}" y2="${TP + (NSTR - 1) * SH + 3}" stroke="#555555" stroke-width="2"/>`);
  }

  // fret numbers below the bottom string
  const fretNumY = TP + (NSTR - 1) * SH + DOT_R + 12;
  for (let f = FRET_START; f <= fretEnd; f++) {
    const x   = fretCX(f);
    const hot = SINGLE_DOTS.includes(f) || DOUBLE_DOTS.includes(f);
    p.push(`<text x="${x}" y="${fretNumY}" text-anchor="middle" font-size="${numFS}" font-family="monospace" fill="${hot ? '#7a8fa8' : '#3a4a5a'}">${f}</text>`);
  }

  // string labels
  for (let s = 0; s < NSTR; s++) {
    p.push(`<text x="${LP - 6}" y="${strY(s) + 4}" text-anchor="end" font-size="${strFS}" font-family="monospace" fill="#4a6080">${STR_NAMES[s]}</text>`);
  }

  // open string dots (full view only)
  if (!isBox) {
    for (let s = 0; s < NSTR; s++) {
      const semi = TUNING[s] % 12;
      const type = classify(semi, rootSemi, charSet, scaleSet, triadSet);
      if (!type) continue;
      const ghost = isGhostMode && triadSet && type !== 'root' && type !== 'triad';
      const deg = (!ghost && chordDegMap && chordDegMap[semi] !== undefined) ? chordDegMap[semi] : (degMap[semi] || '');
      const isCharTone = !ghost && charSet.has(semi);
      const colors = ghost ? DOT_COLORS.scale_ghost
        : (isGhostMode && triadSet) ? (
            (chordDegMap && chordDegMap[semi] === 'R') ? DOT_COLORS.triad_root
            : (type === 'root') ? DOT_COLORS.root_faded
            : isCharTone ? DOT_COLORS.char
            : DOT_COLORS.triad
          )
        : DOT_COLORS[type];
      p.push(dot(LP + OPEN_W / 2, strY(s), nameMap[semi] || '', deg, colors));
    }
  }

  // fretted dots
  for (let s = 0; s < NSTR; s++) {
    for (let f = FRET_START; f <= fretEnd; f++) {
      const semi = (TUNING[s] + f) % 12;
      const type = classify(semi, rootSemi, charSet, scaleSet, triadSet);
      if (!type) continue;
      const ghost = isGhostMode && triadSet && type !== 'root' && type !== 'triad';
      const deg = (!ghost && chordDegMap && chordDegMap[semi] !== undefined) ? chordDegMap[semi] : (degMap[semi] || '');
      const isCharTone = !ghost && charSet.has(semi);
      const colors = ghost ? DOT_COLORS.scale_ghost
        : (isGhostMode && triadSet) ? (
            (chordDegMap && chordDegMap[semi] === 'R') ? DOT_COLORS.triad_root
            : (type === 'root') ? DOT_COLORS.root_faded
            : isCharTone ? DOT_COLORS.char
            : DOT_COLORS.triad
          )
        : DOT_COLORS[type];
      p.push(dot(fretCX(f), strY(s), nameMap[semi] || '', deg, colors));
    }
  }

  el.innerHTML = p.join('');
}

function dot(cx, cy, nname, deg, c) {
  const label       = selLabel === 'interval' ? deg : nname;
  const fs          = label.length > 2 ? 7 : label.length === 2 ? 8 : 10;
  const textOpacity = c.textOpacity !== undefined ? c.textOpacity : 1;
  const parts = [];
  if (c.ring) parts.push(`<circle cx="${cx}" cy="${cy}" r="${DOT_R + 3}" fill="none" stroke="${c.ring}" stroke-width="2"/>`);
  parts.push(`<circle cx="${cx}" cy="${cy}" r="${DOT_R}" fill="${c.fill}" stroke="${c.stroke}" stroke-width="1.2" fill-opacity="${c.opacity}"/>`);
  parts.push(`<text x="${cx}" y="${cy}" text-anchor="middle" dominant-baseline="middle" font-size="${fs}" font-weight="700" font-family="system-ui,sans-serif" fill="#fff" fill-opacity="${textOpacity}">${label}</text>`);
  return parts.join('');
}

// ── Info panel ───────────────────────────────────────────────────────────────
function updateInfo(rootSemi, modeIdx) {
  const mode    = MODES[modeIdx];
  const charSet = new Set([...mode.characteristic, mode.intervals[2]].map(i => (rootSemi + i) % 12));

  document.getElementById('info-title').textContent = `${keyLabel(rootSemi)} ${mode.name}`;
  document.getElementById('info-alias').textContent = mode.alias ? `(${mode.alias})` : '';
  document.getElementById('info-desc').textContent  = mode.desc;

  const strip = document.getElementById('note-strip');
  strip.innerHTML = '';

  mode.intervals.forEach((interval, idx) => {
    const semi = (rootSemi + interval) % 12;
    const name = resolvedName(rootSemi, idx, interval);
    const deg  = mode.degrees[idx];
    const isRoot = interval === 0;
    const isChar = charSet.has(semi);

    const badge = document.createElement('div');
    badge.className = 'note-badge' + (isRoot ? ' nb-root' : isChar ? ' nb-char' : '');

    const typeClass = isRoot ? 'root' : isChar ? 'char' : 'scale';
    const dispDeg = isRoot ? 'R' : deg;
    badge.innerHTML = `<span class="nb-deg ${typeClass}">${dispDeg}</span><span class="nb-name ${typeClass}">${name}</span>`;
    strip.appendChild(badge);
  });
}

function updateChordStrip(rootSemi, modeIdx) {
  const wrap = document.getElementById('chord-strip-wrap');
  const isGhostMode = selFrets === 'triads' || selFrets === '7ths';
  if (!isGhostMode || selTriad === null) { wrap.style.display = 'none'; return; }
  wrap.style.display = '';

  const is7ths = selFrets === '7ths';
  const chords = is7ths ? get7ths(rootSemi, modeIdx) : getTriads(rootSemi, modeIdx);
  const chord  = chords[selTriad];
  const degMap = is7ths ? chord.degMap7 : chord.degMap3;

  const mode = MODES[modeIdx];
  const charSet = new Set([...mode.characteristic, mode.intervals[2]].map(i => (rootSemi + i) % 12));
  const nameMap = {};
  mode.intervals.forEach((interval, idx) => {
    nameMap[(rootSemi + interval) % 12] = resolvedName(rootSemi, idx, interval);
  });

  document.getElementById('chord-strip-title').textContent = chord.name;
  const strip = document.getElementById('chord-strip');
  strip.innerHTML = '';

  const INT_ORDER = ['R', 'b2', 'b3', '3', 'b5', '5', '#5', 'bb7', 'b7', '7'];
  const entries = Object.entries(degMap).map(([k, v]) => [parseInt(k), v]);
  entries.sort((a, b) => INT_ORDER.indexOf(a[1]) - INT_ORDER.indexOf(b[1]));

  entries.forEach(([semi, intLabel]) => {
    const name = nameMap[semi] || '';
    const isRoot = intLabel === 'R';
    const isChar = !isRoot && charSet.has(semi);
    const badge = document.createElement('div');
    badge.className = 'note-badge' + (isRoot ? ' nb-chord-root' : isChar ? ' nb-char' : ' nb-chord-tone');
    const cls = isRoot ? 'chord-root' : isChar ? 'char' : 'chord-tone';
    badge.innerHTML = `<span class="nb-deg ${cls}">${intLabel}</span><span class="nb-name ${cls}">${name}</span>`;
    strip.appendChild(badge);
  });
}

// ── Buttons ───────────────────────────────────────────────────────────────────
function keyLabel(i) {
  if (selNotation === '#') return CHR_SHARP[i];
  if (selNotation === 'b') return CHR_FLAT[i];
  return KEY_NAMES[i];
}

function buildKeyBtns() {
  const kw = document.getElementById('key-btns');
  kw.innerHTML = '';
  KEY_NAMES.forEach((_, i) => {
    const b = document.createElement('button');
    b.className = 'btn' + (i === selKey ? ' key-active' : '');
    b.textContent = keyLabel(i);
    b.onclick = () => {
      selKey = i;
      kw.querySelectorAll('.btn').forEach((el, j) => {
        el.className = 'btn' + (j === i ? ' key-active' : '');
      });
      render();
    };
    kw.appendChild(b);
  });
}

function initButtons() {
  buildKeyBtns();

  const mw = document.getElementById('mode-btns');
  MODES.forEach((m, i) => {
    const b = document.createElement('button');
    b.className = 'btn' + (i === selMode ? ' mode-active' : '');
    b.textContent = `${i + 1}. ${m.name}`;
    b.onclick = () => {
      selMode = i;
      mw.querySelectorAll('.btn').forEach((el, j) => {
        el.className = 'btn' + (j === i ? ' mode-active' : '');
      });
      render();
    };
    mw.appendChild(b);
  });
}

function initLabelToggle() {
  const lw = document.getElementById('label-btns');
  [{ label: 'Interval', val: 'interval' }, { label: 'Note', val: 'note' }].forEach(({ label, val }) => {
    const b = document.createElement('button');
    b.className = 'btn' + (val === selLabel ? ' mode-active' : '');
    b.textContent = label;
    b.onclick = () => {
      selLabel = val;
      lw.querySelectorAll('.btn').forEach(el => el.className = 'btn');
      b.className = 'btn mode-active';
      render();
    };
    lw.appendChild(b);
  });
}

function initFretToggle() {
  const fw = document.getElementById('fret-btns');
  [{ label: '3NPS', val: 'box' }, { label: '15 frets', val: 15 }, { label: '24 frets', val: 24 }, { label: 'Triads', val: 'triads' }, { label: '7ths', val: '7ths' }].forEach(({ label, val }) => {
    const b = document.createElement('button');
    b.className = 'btn' + (val === selFrets ? ' mode-active' : '');
    b.textContent = label;
    b.onclick = () => {
      selFrets = val;
      if (val === 'triads' || val === '7ths') { if (selTriad === null) selTriad = 0; }
      else selTriad = null;
      fw.querySelectorAll('.btn').forEach(el => el.className = 'btn');
      b.className = 'btn mode-active';
      render();
    };
    fw.appendChild(b);
  });
}

function buildTriadBtns() {
  const is7ths  = selFrets === '7ths';
  const label   = document.getElementById('chord-label');
  if (label) label.textContent = is7ths ? '7th' : 'Triad';

  const tw = document.getElementById('triad-btns');
  tw.innerHTML = '';
  const chords = is7ths ? get7ths(selKey, selMode) : getTriads(selKey, selMode);

  const none = document.createElement('button');
  none.className = 'btn' + (selTriad === null ? ' mode-active' : '');
  none.textContent = '—';
  none.onclick = () => {
    selTriad = null;
    tw.querySelectorAll('.btn').forEach(el => el.className = 'btn');
    none.className = 'btn mode-active';
    render();
  };
  tw.appendChild(none);

  chords.forEach((chord, i) => {
    const b = document.createElement('button');
    b.className = 'btn' + (i === selTriad ? ' mode-active' : '');
    b.textContent = chord.name;
    b.onclick = () => {
      selTriad = i;
      tw.querySelectorAll('.btn').forEach(el => el.className = 'btn');
      b.className = 'btn mode-active';
      render();
    };
    tw.appendChild(b);
  });
}

function render() {
  if (padPlaying && (selKey !== padPrevKey || selMode !== padPrevMode || selFrets !== padPrevFrets)) restartPad();
  buildKeyBtns();
  buildSVG(selKey, selMode);
  updateInfo(selKey, selMode);
  updateChordStrip(selKey, selMode);
  updatePadBtn();
  buildTriadBtns();
}

function initNotationToggle() {
  const nw = document.getElementById('notation-btns');
  ['b', '#'].forEach(val => {
    const b = document.createElement('button');
    b.className = 'btn' + (selNotation === val ? ' mode-active' : '');
    b.textContent = val;
    b.onclick = () => {
      selNotation = (selNotation === val) ? 'auto' : val;
      nw.querySelectorAll('.btn').forEach(el => el.className = 'btn');
      if (selNotation !== 'auto') b.className = 'btn mode-active';
      render();
    };
    nw.appendChild(b);
  });
}

// ── Pad ──────────────────────────────────────────────────────────────────────
let padCtx = null, padGain = null, padNodes = [], padPlaying = false;
let padPrevKey = null, padPrevMode = null, padPrevFrets = null;

function midiToFreq(midi) { return 440 * Math.pow(2, (midi - 69) / 12); }

function makePadReverb(ctx) {
  const sr = ctx.sampleRate, len = sr * 2;
  const buf = ctx.createBuffer(2, len, sr);
  for (let ch = 0; ch < 2; ch++) {
    const d = buf.getChannelData(ch);
    for (let i = 0; i < len; i++) d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / len, 3);
  }
  const conv = ctx.createConvolver();
  conv.buffer = buf;
  return conv;
}

function buildPadMidi() {
  const is7ths = selFrets === '7ths';
  const notes = (is7ths ? get7ths(selKey, selMode)[0] : getTriads(selKey, selMode)[0]).notes;
  const chordRoot = selKey;
  const sorted = [...notes].sort((a, b) => ((a - chordRoot + 12) % 12) - ((b - chordRoot + 12) % 12));
  const midis = [chordRoot + 36]; // bass root ~octave 2
  let prev = midis[0];
  sorted.forEach(semi => {
    let midi = semi + 48;
    while (midi <= prev) midi += 12;
    prev = midi;
    midis.push(midi);
  });
  return midis;
}

function startPad() {
  padCtx = new (window.AudioContext || window.webkitAudioContext)();
  const comp = padCtx.createDynamicsCompressor();
  comp.threshold.value = -18; comp.ratio.value = 4;
  comp.connect(padCtx.destination);

  padGain = padCtx.createGain();
  padGain.gain.setValueAtTime(0, padCtx.currentTime);
  padGain.gain.linearRampToValueAtTime(0.65, padCtx.currentTime + 1.5);

  const reverb = makePadReverb(padCtx);
  const revGain = padCtx.createGain();
  revGain.gain.value = 0.4;
  reverb.connect(revGain);
  revGain.connect(comp);

  const lpf = padCtx.createBiquadFilter();
  lpf.type = 'lowpass'; lpf.frequency.value = 1800; lpf.Q.value = 0.7;
  lpf.connect(padGain);
  padGain.connect(comp);

  buildPadMidi().forEach((midi, i) => {
    const freq = midiToFreq(midi);
    const ng = padCtx.createGain();
    ng.gain.value = i === 0 ? 0.12 : 0.17;
    [['sine', 1], ['triangle', 1.003], ['sine', 0.997]].forEach(([type, det]) => {
      const osc = padCtx.createOscillator();
      osc.type = type; osc.frequency.value = freq * det;
      osc.connect(ng); osc.start(); padNodes.push(osc);
    });
    ng.connect(lpf); ng.connect(reverb); padNodes.push(ng);
  });
}

function stopPad(instant) {
  if (!padGain || !padCtx) return;
  const now = padCtx.currentTime;
  padGain.gain.setValueAtTime(padGain.gain.value, now);
  padGain.gain.linearRampToValueAtTime(0, now + (instant ? 0.05 : 1.5));
  const ctx = padCtx;
  setTimeout(() => {
    padNodes.forEach(n => { try { n.disconnect(); } catch(e) {} });
    padNodes = [];
    try { ctx.close(); } catch(e) {}
    if (padCtx === ctx) { padCtx = null; padGain = null; }
  }, instant ? 150 : 1800);
}

function updatePadBtn() {
  const btn = document.getElementById('pad-btn');
  if (!btn) return;
  const is7ths = selFrets === '7ths';
  btn.textContent = (is7ths ? get7ths(selKey, selMode)[0] : getTriads(selKey, selMode)[0]).name;
}

function togglePad() {
  const btn = document.getElementById('pad-btn');
  if (!padPlaying) {
    startPad(); padPlaying = true;
    padPrevKey = selKey; padPrevMode = selMode; padPrevFrets = selFrets;
    btn.classList.add('pad-active');
  } else {
    stopPad(false); padPlaying = false;
    btn.classList.remove('pad-active');
  }
}

function restartPad() {
  if (!padPlaying) return;
  // Capture and fade out the current context independently
  if (padGain && padCtx) {
    const oldGain = padCtx.createGain();  // dummy — use padGain directly
    const oldCtx  = padCtx;
    const oldNodes = padNodes.slice();
    const now = oldCtx.currentTime;
    padGain.gain.setValueAtTime(padGain.gain.value, now);
    padGain.gain.linearRampToValueAtTime(0, now + 0.35);
    setTimeout(() => {
      oldNodes.forEach(n => { try { n.disconnect(); } catch(e) {} });
      try { oldCtx.close(); } catch(e) {}
    }, 500);
    padCtx = null; padGain = null; padNodes = [];
  }
  startPad();
  padPrevKey = selKey; padPrevMode = selMode; padPrevFrets = selFrets;
}

function resetPad() {
  if (!padPlaying) return;
  stopPad(true); padPlaying = false;
  const btn = document.getElementById('pad-btn');
  if (btn) btn.classList.remove('pad-active');
}

initButtons();
initFretToggle();
initLabelToggle();
initNotationToggle();
render();
</script>
</body>
